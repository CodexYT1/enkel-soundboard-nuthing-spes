<!DOCTYPE html>
<html>
<head>
    <title>EZ Soundboard</title>
    <style>
        body {
            background: radial-gradient(circle at top left, rgba(88,101,242,0.16), transparent 25%),
                        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.08), transparent 20%),
                        linear-gradient(180deg, #202225 0%, #181a1f 100%);
            color: #ffffff;
            font-family: "Segoe UI", Arial, sans-serif;
            text-align: center;
            padding: 60px 20px 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            border: 1px solid #3c3f45;
            box-sizing: border-box;
        }

        #titleBar {
            position: fixed;
            inset: 0 0 auto 0;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: rgba(32,34,37,0.98);
            border-bottom: 1px solid #2f3136;
            -webkit-app-region: drag;
            z-index: 20;
        }

        #windowTitle {
            color: #d1d5db;
            font-size: 12px;
            letter-spacing: 0.02em;
            user-select: none;
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .window-button {
            width: 34px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #f2f3f5;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s ease;
            -webkit-app-region: no-drag;
        }

        .window-button:hover {
            background: rgba(88,101,242,0.18);
        }

        .window-button.close:hover {
            background: #ed4245;
        }

        #add {
            position: absolute;
            top: 54px;
            left: 20px;
            background: #5865f2;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.15s ease;
            z-index: 10;
        }

        #add:hover {
            background: #4752c4;
        }

        #settingsBtn {
            position: absolute;
            top: 54px;
            right: 20px;
            background: #4f545c;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.15s ease;
            z-index: 10;
        }

        #settingsBtn:hover {
            background: #42454d;
        }

        h1 {
            margin-top: 70px;
            margin-bottom: 4px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow:
                0 1px 0 rgba(255,255,255,0.08),
                0 10px 30px rgba(88,101,242,0.22);
            background: linear-gradient(90deg, #7289da, #8b5cf6, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            margin: 0 auto 24px;
            max-width: 560px;
            color: #b9bbbe;
            font-size: 14px;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        #buttons {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            padding: 20px 24px 40px 24px;
        }

        .sound-tile {
            background: #2f3136;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            position: relative;
            height: 150px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px 12px 14px 12px;
            cursor: pointer;
            overflow: hidden;
        }

        .sound-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.28);
            border-color: rgba(88,101,242,0.4);
        }

        .delete-btn {
            position: absolute;
            bottom: 14px;
            left: 14px;
            background: #ed4245;
            padding: 5px 8px;
            border-radius: 8px;
            font-size: 11px;
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 20;
        }

        .gear-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.06);
            color: #d1d5db;
            border: none;
            border-radius: 8px;
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.2s, background 0.2s;
            font-size: 14px;
        }

        .gear-btn:hover {
            background: rgba(88,101,242,0.18);
        }

        .color-dot {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5865f2;
            flex-shrink: 0;
        }

        .label-row {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0;
        }

        .sound-tile:hover .delete-btn,
        .sound-tile:hover .gear-btn {
            opacity: 1;
        }

        .volume-slider {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 42px;
            height: 6px;
            accent-color: #7289da;
        }

        .label-text {
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            text-shadow: 0 0 3px rgba(0,0,0,0.4);
            cursor: default;
        }

        #popup, #deletePopup, #settingsModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(32,34,37,0.98);
            border: 1px solid #202225;
            padding: 24px;
            border-radius: 18px;
            display: none;
            flex-direction: column;
            gap: 14px;
            width: 320px;
            z-index: 20;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
        }

        .custom-border {
            border: 1px solid #3c3f45;
            border-radius: 6px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        #popup input, #deletePopup input, #settingsModal input, #settingsModal select {
            background: #202225;
            color: white;
            font-size: 14px;
            padding: 10px;
        }

        #popup select {
            background: #202225;
            color: white;
            font-size: 13px;
            padding: 10px;
        }

        #popup input, #deletePopup input, #settingsModal input, #settingsModal select,
        #popup select {
            border: 1px solid #3c3f45;
            border-radius: 6px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        #popup input:focus, #deletePopup input:focus, #settingsModal input:focus, #settingsModal select:focus,
        #popup select:focus {
            outline: none;
            border-color: #5865f2;
            box-shadow: 0 0 0 4px rgba(88,101,242,0.18);
        }

        #confirm, #deleteYes, #deleteNo, #cancelKey, #clearKey, #closeSettings, #startTour {
            background: #5865f2;
            border: none;
            padding: 9px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        #deleteNo, #cancelKey, #closeSettings, #startTour {
            background: #4f545c;
        }

        #clearKey {
            background: #ed4245;
        }

        #confirm:hover, #deleteYes:hover {
            background: #4752c4;
        }

        #deleteNo:hover, #cancelKey:hover, #closeSettings:hover, #startTour:hover {
            background: #3c3f45;
        }

        #clearKey:hover {
            background: #b53538;
        }

        #settingsModal h2 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }

        .settings-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            font-size: 13px;
            color: #b5bac1;
        }

        .settings-row label {
            font-size: 13px;
        }

        #settingsModal select {
            width: 100%;
        }

        #monitorToggle {
            transform: scale(1.1);
            margin-right: 6px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 20px;
                margin-top: 90px;
            }

            #add {
                padding: 10px 16px;
                font-size: 14px;
            }

            .sound-tile {
                height: 130px;
            }
        }

        /* Modal overlay */
        #modalOverlay {
            position: fixed;
            top: 84px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.45);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            z-index: 15;
        }

        #modalOverlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Tutorial overlay */
        #tourOverlay {
            position: fixed;
            inset: 0;
            display: none;
            pointer-events: none;
            z-index: 50;
        }

        #tourBackdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.65);
        }

        #tourHighlight {
            position: absolute;
            border-radius: 12px;
            box-shadow: 0 0 0 3px #5865f2, 0 0 25px rgba(88,101,242,0.8);
            background: transparent;
        }

        #tourBox {
            position: absolute;
            max-width: 260px;
            background: #2b2d31;
            border-radius: 10px;
            padding: 12px 14px;
            color: #f2f3f5;
            font-size: 13px;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
        }

        #tourButtons {
            margin-top: 8px;
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }

        #tourNext, #tourSkip {
            pointer-events: auto;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        #tourNext {
            background: #5865f2;
            color: white;
        }

        #tourSkip {
            background: #4f545c;
            color: white;
        }
    </style>
</head>
<body>

<div id="titleBar">
    <div id="windowTitle">EZ Soundboard</div>
    <div class="window-controls">
        <button class="window-button" id="minimizeBtn" aria-label="Minimize">–</button>
        <button class="window-button" id="maximizeBtn" aria-label="Maximize">🗖</button>
        <button class="window-button close" id="closeBtn" aria-label="Close">✕</button>
    </div>
</div>

<button id="add">➕ Add Sound</button>
<button id="settingsBtn">Settings</button>

<h1>EZ Soundboard</h1>
<p class="subtitle">A fast, Discord-inspired audio deck built for chat, streaming, and quick sound drops.</p>
<div id="buttons"></div>
<div id="modalOverlay"></div>

<div id="popup">
    <input id="labelInput" placeholder="Label">
    <input id="keyInput" placeholder="Press ALT or CTRL…" readonly>
    <select id="colorSelect">
        <option value="#5865f2">Blurple</option>
        <option value="#57f287">Green</option>
        <option value="#fee75c">Yellow</option>
        <option value="#ed4245">Red</option>
        <option value="#eb459e">Pink</option>
        <option value="#ffffff">White</option>
    </select>
    <button id="confirm">Save</button>
    <button id="clearKey">Clear Keybind</button>
    <button id="cancelKey">Cancel</button>
</div>

<div id="deletePopup">
    <div>Are you sure?</div>
    <button id="deleteYes">Delete</button>
    <button class="cancel" id="deleteNo">Cancel</button>
</div>

<div id="settingsModal">
    <h2>Settings</h2>
    <div class="settings-row">
        <label for="deviceSelect">Main Output (Sonar Mic):</label>
        <select id="deviceSelect"></select>
    </div>
    <div class="settings-row">
        <label for="monitorSelect">Monitor device:</label>
        <select id="monitorSelect"></select>
    </div>
    <div class="settings-row">
        <label>
            <input type="checkbox" id="monitorToggle">
            Hear my soundboard
        </label>
    </div>
    <button id="startTour">How to use EZ Soundboard</button>
    <button id="closeSettings">Close</button>
</div>

<div id="tourOverlay">
    <div id="tourBackdrop"></div>
    <div id="tourHighlight"></div>
    <div id="tourBox">
        <p id="tourText"></p>
        <div id="tourButtons">
            <button id="tourNext">Next</button>
            <button id="tourSkip">Skip all</button>
        </div>
    </div>
</div>

<audio id="mixOut" autoplay></audio>
<audio id="monitorOut" autoplay></audio>

<script src="renderer.js"></script>
</body>
</html>
